name: ${APP_NAME:-open-data}

services:
  app:
    build:
      context: .
      target: builder
      platforms:
        - linux/amd64
        - linux/arm64

    command: npm start -- --host 0.0.0.0

    environment:
      - DEBUG=true
      - CI=false
      - NODE_ENV=development

    volumes:
      - /app/node_modules
      - ./:/app

    ports:
      - "3000:3000"
